name = "gramstep-worker"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
META_API_VERSION = "v25.0"

[[d1_databases]]
binding = "DB"
database_name = "gramstep"
database_id = "your_d1_database_id"

[[kv_namespaces]]
binding = "KV"
id = "your_kv_namespace_id"

[[queues.producers]]
binding = "SEND_QUEUE"
queue = "gramstep-send"

[[queues.consumers]]
queue = "gramstep-send"
max_batch_size = 10
max_batch_timeout = 5
dead_letter_queue = "gramstep-dlq"

[[queues.producers]]
binding = "DLQ"
queue = "gramstep-dlq"

[[r2_buckets]]
binding = "R2"
bucket_name = "your_r2_bucket_name"

[[workflows]]
binding = "DRIP_WORKFLOW"
name = "your_drip_workflow_name"
class_name = "DripWorkflow"

[triggers]
crons = [
  "*/5 * * * *",
  "0 3 * * *"
]
